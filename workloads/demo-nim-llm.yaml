{
  "apiVersion": "fleet.cattle.io/v1alpha1",
  "kind": "HelmOp",
  "metadata": {
    "name": "demo-nim-llm",
    "namespace": "fleet-local"
  },
  "spec": {
    "defaultNamespace": "demo-system",
    "helm": {
      "chart": "nim-llm",
      "disablePreProcess": true,
      "releaseName": "demo-nim-llm",
      "repo": "https://helm.ngc.nvidia.com/nvidia",
      "values": {
        "global": {
          "imagePullSecrets": [
            {
              "name": "suse-ai-pull-combined"
            }
          ]
        },
        "imagePullSecrets": [
          {
            "name": "suse-ai-pull-combined"
          }
        ]
      },
      "version": "1.0.0"
    },
    "targets": [
      {
        "clusterName": "local"
      }
    ]
  }
}